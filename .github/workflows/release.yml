name: Build release ZIP

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release-zip:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build installer ZIP
        run: |
          set -euo pipefail
          mkdir -p dist
          zip -X -j dist/levelup-vnav-descent-installer.zip \
            README.md \
            z_Install.py \
            B738.a_fms_levelup_tables.lua \
            Add_to_take_alt_dist.txt \
            Add_to_take_alt_dist_mach.txt
          sha256sum dist/levelup-vnav-descent-installer.zip > dist/levelup-vnav-descent-installer.zip.sha256
          unzip -l dist/levelup-vnav-descent-installer.zip
          cat dist/levelup-vnav-descent-installer.zip.sha256

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: levelup-vnav-descent-installer
          path: |
            dist/levelup-vnav-descent-installer.zip
            dist/levelup-vnav-descent-installer.zip.sha256
          if-no-files-found: error

      - name: Attach ZIP to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" --title "$tag" --notes "LevelUp VNAV descent installer $tag"
          fi
          gh release upload "$tag" \
            dist/levelup-vnav-descent-installer.zip \
            dist/levelup-vnav-descent-installer.zip.sha256 \
            --clobber

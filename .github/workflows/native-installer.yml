name: Build native VNAV installer

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pyinstaller:
    name: PyInstaller (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - windows-latest
          - ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependency
        run: python -m pip install -r smart_installer/packaging/requirements-pyinstaller.txt

      - name: Build PyInstaller bundle
        run: python smart_installer/packaging/build_pyinstaller.py

      - name: Archive POSIX bundle
        if: runner.os != 'Windows'
        run: |
          cd dist/native/pyinstaller
          tar -czf ../LevelUpVNAVInstaller-${{ runner.os }}.tar.gz .

      - name: Archive Windows bundle
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path dist/native/pyinstaller/* -DestinationPath dist/native/LevelUpVNAVInstaller-Windows.zip

      - name: Upload POSIX artifact
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: LevelUpVNAVInstaller-${{ runner.os }}
          path: dist/native/LevelUpVNAVInstaller-${{ runner.os }}.tar.gz
          if-no-files-found: error

      - name: Upload Windows artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: LevelUpVNAVInstaller-Windows
          path: dist/native/LevelUpVNAVInstaller-Windows.zip
          if-no-files-found: error

  briefcase-prepare:
    name: Briefcase project preparation
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Prepare Briefcase project
        run: python smart_installer/packaging/build_briefcase.py

      - name: Upload generated Briefcase project
        uses: actions/upload-artifact@v4
        with:
          name: briefcase-project
          path: build/briefcase_project
          if-no-files-found: error
